# App + PostgreSQL. Copy .env.example to .env and set RAILS_MASTER_KEY before first run.
#
#   docker compose up --build
#
# App: http://localhost:3000  (override with WEB_PORT=8080 docker compose up)

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: latinwiki
      POSTGRES_PASSWORD: latinwiki
      POSTGRES_DB: latinwiki_production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U latinwiki -d latinwiki_production"]
      interval: 3s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build: .
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      RAILS_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://latinwiki:latinwiki@db:5432/latinwiki_production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
